server.port=8080
spring.application.name=smart-complaint-system

# File storage paths
app.storage.path=./data
app.storage.users-file=./data/users.json
app.storage.complaints-file=./data/complaints.json
app.storage.departments-file=./data/departments.json
app.storage.notifications-file=./data/notifications.json
app.storage.audit-log-file=./data/audit_log.json

# Escalation config (hours before escalation)
app.escalation.deadline-hours=48
app.escalation.check-interval-minutes=30

# CORS
spring.web.cors.allowed-origins=*

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.com.smartcms=DEBUG
logging.file.name=./data/system.log
